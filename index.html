<head>
   <meta charset="utf-8">

<title>alle — New Model</title>


<style>
 *{box-sizing:border-box;margin:0;padding:0;font-family:Arial,Helvetica,sans-serif}
  body{background:#fff;color:#111;auto;padding-bottom:80px}
  img{display:block;max-width:100%}
  button{cursor:pointer;font-family:inherit}
  a{text-decoration:none;color:inherit}


  /* HERO */
  .hero{position:relative}
  .hero>img{width:100%;height:50vh;object-fit:cover}
  .nav{position:absolute;top:0;left:0;right:0;display:flex;justify-content:space-between;
       align-items:center;padding:16px 20px;background:rgba(0,0,0,.4);color:#fff}
  .nav button,.nav a{background:none;border:none;color:#fff;font-size:24px}
  .brand{font-size:28px;font-weight:90;letter-spacing:-1px;text-transform:lowercase}
  .brand sup{font-size:1px}
   .brand>img{width :15%}
  .caption{position:absolute;bottom:24px;left:20px;background:rgba(0,0,0,.55);
           color:#fff;padding:8px 16px;font-size:26px;font-weight:800;letter-spacing:1px}

  /* SLIDER DOTS */
  .slider{display:flex;gap:0px;padding:16px 20px}
  .slider span{flex:1;height:2px;background:#111}
  .slider span.dim{background:#ccc}

 
 

  /* SECTION TITLE */
  .sec-title{padding:0 20px;display:flex;justify-content:space-between;
             align-items:flex-end;margin-bottom:12px}
  .sec-title h2{font-size:22px;font-weight:900}
  .sec-title a{font-size:11px;letter-spacing:2px;color:#777}

  /* GRID */
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:0 20px}
  .card{border:1px solid #ddd;cursor:pointer;background:#fff}
  .card .img-wrap{position:relative}
  .card img{width:100%;aspect-ratio:1/1;object-fit:cover}
  .tag{position:absolute;top:8px;left:8px;background:#111;color:#fff;
       font-size:10px;font-weight:bold;padding:2px 8px;letter-spacing:2px}
  .heart{position:absolute;top:8px;right:8px;background:rgba(255,255,255,.8);
         border:none;padding:6px;border-radius:50%;font-size:12px}
  .card-info{padding:10px}
  .card-info h3{font-size:11px;font-weight:bold;letter-spacing:2px;margin-top:4px}
  .card-info p{font-size:14px;font-weight:bold;margin-top:4px}
  .stars{font-size:10px;color:#777}

  /* BANNER */
  .banner{margin:40px 20px 0;background:#111;color:#fff;text-align:center;padding:24px}
  .banner p.eyebrow{font-size:11px;letter-spacing:4px;margin-bottom:8px}
  .banner h3{font-size:28px;font-weight:900;margin-bottom:8px}
  .banner p.sub{font-size:11px;color:rgba(255,255,255,.7);margin-bottom:16px}
  .banner button{background:#fff;color:#111;border:none;padding:8px 24px;
                 font-size:11px;font-weight:bold;letter-spacing:2px}

  /* FOOTER */
  footer{margin-top:40px;padding:0 20px;text-align:center}
  footer h4{font-size:22px;font-weight:900;text-transform:lowercase}
  footer .meta{font-size:11px;color:#777;letter-spacing:2px;margin-top:8px}
  footer .ig{display:inline-flex;align-items:center;gap:8px;margin-top:16px;color:#777}
  footer .copy{font-size:10px;color:#777;margin-top:24px}

  /* BOTTOM NAV */
  .bottom-nav{position:fixed;bottom:0;left:0;right:0;max-width:480px;margin:0 auto;
              background:#fff;border-top:1px solid #ddd;display:flex;
              justify-content:space-around;padding:12px 0}
  .bottom-nav button{display:flex;flex-direction:column;align-items:center;
                     background:none;border:none;color:#777;font-size:18px}
  .bottom-nav button.active{color:#111}
  .bottom-nav span{font-size:10px;margin-top:4px;letter-spacing:2px}

  /* MODAL */
  .modal{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:50;
         display:none;justify-content:center;align-items:flex-end}
  .modal.open{display:flex}
  .modal-content{background:#fff;width:100%;max-width:480px;max-height:92vh;
                 overflow-y:auto;position:relative}
  .close-btn{position:absolute;top:12px;right:12px;background:rgba(255,255,255,.9);
             border:none;padding:8px;border-radius:50%;font-size:16px;z-index:10}
  .modal img{width:100%;aspect-ratio:1/1;object-fit:cover}
  .modal-body{padding:20px}
  .modal-body .tag{position:static;display:inline-block;margin-bottom:8px}
  .modal-body h2{font-size:24px;font-weight:900;letter-spacing:3px}
  .modal-body .price-big{font-size:28px;font-weight:bold;letter-spacing:2px;margin-top:12px}
  .modal-body .desc{font-size:14px;color:#666;margin-top:16px;line-height:1.6}
  .ig-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;
          background:#111;color:#fff;border:none;padding:14px;font-size:13px;
          font-weight:bold;letter-spacing:2px;margin-top:24px}
  .close-cta{width:100%;background:#fff;color:#111;border:1px solid #111;padding:14px;
             font-size:13px;font-weight:bold;letter-spacing:2px;margin-top:12px}
  .hint{font-size:10px;color:#777;text-align:center;margin-top:16px;letter-spacing:2px}
</style>
</head>
<body>
   
 
<!-- HERO -->
<section class="hero">

  alt="New model handbag" />
  
  <header class="nav">
    

    
   
    <div class="brand">
    
     <img src="    

https://cdn.phototourl.com/pro/2026-05-26-73b7aade-ebb4-4ac6-bf45-f9d032cc531a.png




  "
  
  alt="" />
  
    
    
    <sup></sup></div>
    <a href="https://www.instagram.com/alle.store0?igsh=ZGZyNGMydW1tcDZz&utm_source=qr" target="_blank" aria-label="Instagram">◉</a>
  </header>
  <div class="caption">NEW MODEL</div>
</section>

<div class="slider">
  <span></span><span class=""></span><span></span>
</div>


<div class="sec-title">
  <h2> ALL MODEL</h2>

</div>

<!-- GRID -->
<section class="grid" id="grid"></section>

<!-- FOOTER -->
<footer>
  <h4>alle
 
  
  
  
  <sup style="font-size:10px">®</sup></h4>
  <p class="meta"> BAGHDAD - KURDISTAN</p>
  <a class="ig" href=https://www.instagram.com/alle.store0?igsh=ZGZyNGMydW1tcDZz&utm_source=qr" target="_blank">
    <span>◉ <span style="font-size:11px;letter-spacing:2px">alle store    </ span>
  </a>
  <p class="copy">© 2026 alle. All rights reserved.</p>
</footer>


<!-- MODAL -->
<div class="modal" id="modal" onclick="closeModal(event)">
  <div class="modal-content" onclick="event.stopPropagation()">
    <button class="close-btn" onclick="closeModal()">✕</button>
    <img id="m-img" src="" alt="" />
    <div class="modal-body">
      <span class="tag" id="m-tag"></span>
      <h2 id="m-name"></h2>
 
      <p class="price-big" id="m-price"></p>
      <p class="desc" id="m-desc"></p>
      <a class="ig-btn" id="m-ig" href="https://www.instagram.com/alle.store0?igsh=ZGZyNGMydW1tcDZz&utm_source=qr" target="_blank">
        ◉ ORDER ON INSTAGRAM
      </a>
      <button class="close-cta" onclick="closeModal()">CLOSE</button>
      <p class="hint">SEND MESSAGE ON INSTAGRAM TO ORDER</p>
    </div>
  </div>
</div>

<script>
  const INSTAGRAM_URL = "https://www.instagram.com/alle.store0?igsh=ZGZyNGMydW1tcDZz&utm_source=qr";

  const products = [
  
  
  
  

  
  
  
  
  
  
  
  
  
    { img:"https://cdn.phototourl.com/free/2026-05-26-a6e6a029-1b89-4579-b223-0fd5e8b07650.png  ",  name:"CHANNEL",    price:"30,000 IQD", tag:"NEW",
      desc:"19cm" },
    { img:"https://cdn.phototourl.com/pro/2026-05-26-a46d669e-b48f-4511-a9e2-97a386589615.png ", name:"Coach",       price:"35,000 IQD", tag:"HOT",
      desc:"21cm" },
    { img:" https://cdn.phototourl.com/pro/2026-05-26-32cadb26-f6c2-4087-bb18-5ad67b0e54f3.png", name:"Aldo", price:"40,000 IQD", tag:"",
      desc:"29cm" },
    { img:"https://cdn.phototourl.com/pro/2026-05-26-0b911ee1-bd74-4a91-b0b1-7f3f556a7dc4.png ",   name:"Giviny",       price:"45,000 IQD", tag:"NEW",
      desc:"25cm" },
  ];

  // Render grid
  const grid = document.getElementById("grid");
  products.forEach((p, i) => {
    grid.innerHTML += `
      <article class="card" onclick="openModal(${i})">
        <div class="img-wrap">
          <img src="${p.img}" alt="${p.name}" />
          ${p.tag ? `<span class="tag">${p.tag}</span>` : ""}
         
        </div>
        <div class="card-info">
    
          <h3>${p.name}</h3>
          <p>${p.price}</p>
        </div>
      </article>`;
  });

  // Modal
  function openModal(i) {
    const p = products[i];
    document.getElementById("m-img").src = p.img;
    document.getElementById("m-img").alt = p.name;
    document.getElementById("m-name").textContent = p.name;
    document.getElementById("m-price").textContent = p.price;
    document.getElementById("m-desc").textContent = p.desc;
    const tag = document.getElementById("m-tag");
    if (p.tag) { tag.textContent = p.tag; tag.style.display = "inline-block"; }
    else tag.style.display = "none";
    document.getElementById("m-ig").href = INSTAGRAM_URL;
    document.getElementById("modal").classList.add("open");
  }
  function closeModal(e) {
    if (e && e.target.closest(".modal-content")) return;
    document.getElementById("modal").classList.remove("open");
  }
</script>
